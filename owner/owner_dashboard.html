<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantis Gardens — Owner Portal</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="stylesheet" href="css/owner.css">
</head>
<body>

<!-- ══ HEADER ══════════════════════════════════════════════ -->
<header class="header">
  <div class="brand">
    <img class="brand-logo" src="img/MantisLogoWhite.png" alt="Mantis"/>
    <div>
      <div class="brand-name">Mantis Gardens</div>
      <div class="brand-sub">Owner Portal</div>
    </div>
  </div>
  <div class="header-right">
    <span class="user-name" id="user-name"></span>
    <button class="sign-out-btn" onclick="doSignOut()">Sign out</button>
  </div>
</header>

<!-- ══ NAV TABS ════════════════════════════════════════════ -->
<nav class="nav-tabs">
  <button class="nav-tab active" data-tab="schedule"   onclick="switchTab('schedule')">&#128197; Schedule</button>
  <button class="nav-tab"        data-tab="clients"    onclick="switchTab('clients')">&#128101; Clients</button>
  <button class="nav-tab"        data-tab="records"    onclick="switchTab('records')">&#128196; Work Records</button>
  <button class="nav-tab"        data-tab="hours"      onclick="switchTab('hours')">&#9200; Crew Hours</button>
</nav>

<!-- ══ STATUS BAR ══════════════════════════════════════════ -->
<div class="status-bar">
  <div class="status-pill" id="sp-clients">
    <span class="sdot" id="sd-clients"></span>
    <span id="sl-clients">Clients: loading…</span>
  </div>
  <div class="status-pill" id="sp-schedule">
    <span class="sdot" id="sd-schedule"></span>
    <span id="sl-schedule">Schedule: loading…</span>
  </div>
  <div class="status-pill" id="sp-records">
    <span class="sdot" id="sd-records"></span>
    <span id="sl-records">Records: loading…</span>
  </div>
  <button class="reload-btn" onclick="clearOwnerCache(); loadAll()">&#8635; Refresh</button>
</div>

<!-- ══ CONTENT AREA ════════════════════════════════════════ -->
<main class="content">

  <!-- ── SCHEDULE TAB ─────────────────────────────────────── -->
  <div id="tab-schedule" class="tab-panel active">
    <div class="panel-header">
      <div class="panel-title">This Week&#39;s Schedule</div>
      <div class="week-nav">
        <button class="wk-btn" onclick="schedWeekOffset(-1)">&#8249;</button>
        <span class="wk-label" id="sched-week-label"></span>
        <button class="wk-btn" onclick="schedWeekOffset(+1)">&#8250;</button>
      </div>
    </div>
    <div id="schedule-grid" class="schedule-grid"></div>
  </div>

  <!-- ── CLIENTS TAB ──────────────────────────────────────── -->
  <div id="tab-clients" class="tab-panel">
    <div class="panel-header">
      <div class="panel-title">Client Database</div>
      <div class="panel-actions">
        <input id="client-search" class="search-input" type="search"
               placeholder="Search clients…" oninput="filterClients(this.value)"/>
        <button class="action-btn primary" onclick="openAddClient()">&#43; Add Client</button>
      </div>
    </div>
    <div id="client-list" class="client-list"></div>
  </div>

  <!-- ── WORK RECORDS TAB ─────────────────────────────────── -->
  <div id="tab-records" class="tab-panel">
    <div class="panel-header">
      <div class="panel-title">Work Records</div>
      <div class="panel-actions">
        <select id="records-filter-client" class="filter-select" onchange="filterRecords()">
          <option value="">All clients</option>
        </select>
        <select id="records-filter-days" class="filter-select" onchange="filterRecords()">
          <option value="7">Last 7 days</option>
          <option value="14">Last 14 days</option>
          <option value="30" selected>Last 30 days</option>
          <option value="90">Last 90 days</option>
          <option value="0">All time</option>
        </select>
      </div>
    </div>
    <div id="records-list" class="records-list"></div>
  </div>

  <!-- ── CREW HOURS TAB ───────────────────────────────────── -->
  <div id="tab-hours" class="tab-panel">
    <div class="panel-header">
      <div class="panel-title">Crew Hours Summary</div>
      <div class="panel-actions">
        <select id="hours-filter-period" class="filter-select" onchange="buildHoursSummary()">
          <option value="7">This week</option>
          <option value="14">Last 2 weeks</option>
          <option value="30" selected>This month</option>
        </select>
      </div>
    </div>
    <div id="hours-summary" class="hours-summary"></div>
  </div>

</main>

<!-- ══ ADD/EDIT CLIENT MODAL ═══════════════════════════════ -->
<div class="modal-overlay" id="client-modal" onclick="closeClientModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="client-modal-title">Add Client</div>
      <button class="modal-close" onclick="closeClientModal()">&#10005;</button>
    </div>
    <div class="modal-body">

      <div class="form-grid">
        <div class="form-group full">
          <label class="form-label">Name(s) <span class="required">*</span></label>
          <input class="form-input" id="cf-name" type="text" placeholder="Last, First & Last, First"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Address</label>
          <input class="form-input" id="cf-address" type="text" placeholder="123 Main St, Sacramento"/>
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input class="form-input" id="cf-phone" type="text" placeholder="916-555-0100"/>
        </div>
        <div class="form-group">
          <label class="form-label">Visit Interval</label>
          <select class="form-input" id="cf-interval">
            <option value="">— select —</option>
            <option>Weekly</option>
            <option>Bi-weekly</option>
            <option>Monthly</option>
            <option>Bi-monthly</option>
            <option>Quarterly</option>
            <option>As needed</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Labor Hours (est.)</label>
          <input class="form-input" id="cf-hours" type="text" placeholder="e.g. 2.5"/>
        </div>
        <div class="form-group">
          <label class="form-label">Active</label>
          <select class="form-input" id="cf-active">
            <option value="✓">✓ Active</option>
            <option value="">Inactive</option>
          </select>
        </div>
        <div class="form-group full">
          <label class="form-label">General Service Notes</label>
          <textarea class="form-textarea" id="cf-service-notes"
            placeholder="General notes about the property and service…"></textarea>
        </div>
        <div class="form-group full">
          <label class="form-label">Gate / Access</label>
          <input class="form-input" id="cf-gate" type="text" placeholder="Gate code, key location, etc."/>
        </div>
        <div class="form-group full">
          <label class="form-label">Irrigation Notes</label>
          <textarea class="form-textarea" id="cf-irrigation"
            placeholder="Controller type, zone notes, known issues…"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Dogs / Animals</label>
          <input class="form-input" id="cf-dogs" type="text" placeholder="e.g. 2 dogs, keep gate closed"/>
        </div>
        <div class="form-group">
          <label class="form-label">Scheduling Notes</label>
          <input class="form-input" id="cf-scheduling" type="text" placeholder="e.g. Not before 9am"/>
        </div>
        <div class="form-group full">
          <label class="form-label">Billing Notes</label>
          <input class="form-input" id="cf-billing" type="text" placeholder="Invoice details, billing contact…"/>
        </div>
      </div>

    </div>
    <div class="modal-footer">
      <button class="fbtn fbtn-cancel" onclick="closeClientModal()">Cancel</button>
      <button class="fbtn fbtn-save" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<!-- ══ CLIENT PROFILE MODAL ════════════════════════════════ -->
<div class="modal-overlay" id="profile-modal" onclick="closeProfileModal(event)">
  <div class="modal modal-wide">
    <div class="modal-header">
      <div class="modal-title" id="profile-modal-title">Client Profile</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="action-btn" id="profile-edit-btn" onclick="editCurrentClient()">&#9998; Edit</button>
        <button class="modal-close" onclick="closeProfileModal()">&#10005;</button>
      </div>
    </div>
    <div class="modal-body" id="profile-modal-body"></div>
  </div>
</div>

<!-- ══ TOAST ════════════════════════════════════════════════ -->
<div class="toast" id="toast"></div>

<script src="../../config.js"></script>
  <script src="js/owner_config.js"></script>
<script src="js/session_timeout.js"></script>
<script src="js/owner_dashboard.js"></script>
</body>
</html>
