<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mantis Gardens — Owner Portal</title>
  <link rel="icon" type="image/x-icon" href="img/favicon.ico">
  <link rel="stylesheet" href="css/owner.css">
</head>
<body class="login-page">

  <div class="login-card">
    <img class="login-logo" src="img/MantisLogoWhite.png" alt="Mantis Gardens"/>
    <div class="login-title">Mantis Gardens</div>
    <div class="login-sub">Owner Portal</div>
    <div class="login-divider"></div>
    <div class="google-signin-wrap">
      <div id="google-signin-btn"></div>
    </div>
    <div class="login-error" id="login-error">Access restricted to authorised owner accounts.</div>
    <div class="login-footer">Mantis Gardens &middot; Sacramento CA &middot; Owner access only</div>
  </div>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../../config.js"></script>
  <script src="js/owner_config.js"></script>
  <script src="js/session_timeout.js"></script>
  <script src="js/owner_login.js"></script>
</body>
</html>
